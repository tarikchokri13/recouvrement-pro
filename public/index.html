<!DOCTYPE html>
<html lang="fr" dir="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#D4A843" />
  <meta name="description" content="Recouvrement Pro - Gestion professionnelle des créances impayées au Maroc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RP" />
  
  <!-- Favicons -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  
  <title>Recouvrement Pro</title>
  
  <style>
    /* Preload styles for faster perceived load */
    body {
      margin: 0;
      padding: 0;
      background: #0C0F1A;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }
    #root {
      min-height: 100vh;
    }
    /* Splash screen while React loads */
    .splash {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0C0F1A, #1A1F35);
      flex-direction: column;
      gap: 16px;
    }
    .splash-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #D4A843, #B8922F);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      color: #0C0F1A;
      box-shadow: 0 8px 32px rgba(212, 168, 67, 0.3);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .splash-text {
      color: #8890A6;
      font-size: 13px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <noscript>Activez JavaScript pour utiliser Recouvrement Pro.</noscript>
  <div id="root">
    <div class="splash">
      <div class="splash-logo">RP</div>
      <div class="splash-text">Chargement...</div>
    </div>
  </div>
</body>
</html>
